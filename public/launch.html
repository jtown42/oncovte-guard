<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OncoVTE Guard — SMART Launch</title>
    <!--
      SMART-on-FHIR EHR launch entry point.

      The EHR opens this URL with `iss` and `launch` query parameters. We kick
      off the OAuth2 authorization handshake here using the standalone
      fhir-client.js build, then the EHR redirects back to ./index.html, where
      the React app calls FHIR.oauth2.ready() to obtain the authorized client.

      This page is intentionally self-contained (CDN script, no bundling) so it
      works as the registered launch URL regardless of the SPA build.
    -->
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2/build/fhir-client.js"></script>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        color: #0f172a;
        background: #f6f8fb;
      }
      .box {
        text-align: center;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #cbd5e1;
        border-top-color: #0b6e99;
        border-radius: 50%;
        margin: 0 auto 12px;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="spinner"></div>
      <p>Connecting to the EHR…</p>
    </div>
    <script>
      FHIR.oauth2.authorize({
        clientId: "oncovte-guard",
        scope:
          "launch patient/Patient.read patient/Condition.read patient/Observation.read patient/MedicationRequest.read openid fhirUser",
        redirectUri: "./index.html",
      });
    </script>
  </body>
</html>
